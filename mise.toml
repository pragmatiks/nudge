[tools]
python = "3.12"
node = "22"
bun = "latest"
uv = "latest"

# --- Server-side tasks (run on the server) ---

[tasks.start]
description = "Start Nudge (claude-mem worker + bot)"
run = "./scripts/entrypoint.sh"

# --- Remote tasks (run from local Mac) ---

[tasks.deploy]
description = "Deploy to remote server"
run = "./scripts/deploy.sh"

[tasks.logs]
description = "Tail remote logs"
run = "ssh root@$NUDGE_SERVER 'journalctl -u nudge -f --no-pager'"

[tasks.ssh]
description = "Open SSH session to server"
run = "ssh root@$NUDGE_SERVER"

[tasks.status]
description = "Check remote service status"
run = "ssh root@$NUDGE_SERVER 'systemctl status nudge && echo \"\" && curl -sf http://localhost:37777/api/health && echo \"\"'"

[tasks.restart]
description = "Restart remote service"
run = "ssh root@$NUDGE_SERVER 'systemctl restart nudge'"

[tasks.stop]
description = "Stop remote service"
run = "ssh root@$NUDGE_SERVER 'systemctl stop nudge'"
