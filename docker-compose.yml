services:
  nudge:
    build: .
    container_name: nudge-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - nudge_data:/data
    environment:
      - TZ=Europe/Berlin
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:37777/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  nudge_data:
    driver: local
